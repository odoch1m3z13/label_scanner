steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/label-scanner'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/label-scanner'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'label-scanner'
      - '--image=gcr.io/$PROJECT_ID/label-scanner'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--concurrency=1'
      - '--min-instances=1'
      - '--max-instances=3'
images:
  - 'gcr.io/$PROJECT_ID/label-scanner'

timeout: '1800s'